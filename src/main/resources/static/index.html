<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111b21;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 700px;
            background-color: #0b141a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* Header */
        .chat-header {
            background-color: #202c33;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a3942;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-color: #00a884;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .header-info h3 {
            color: #e9edef;
            font-size: 16px;
            font-weight: 600;
        }

        .header-info .status {
            color: #8696a0;
            font-size: 12px;
            margin-top: 2px;
        }

        .status.online::before {
            content: '';
            display: inline-block;
            width: 7px;
            height: 7px;
            background-color: #00a884;
            border-radius: 50%;
            margin-right: 5px;
        }

        /* Messages area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23182229' fill-opacity='0.8'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #374045;
            border-radius: 3px;
        }

        /* Message bubbles */
        .message {
            max-width: 78%;
            padding: 8px 12px 6px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .message.sent {
            background-color: #005c4b;
            color: #e9edef;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.received {
            background-color: #202c33;
            color: #e9edef;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .message .time {
            font-size: 11px;
            color: #8696a0;
            text-align: right;
            margin-top: 3px;
        }

        .message.sent .time::after {
            content: ' ✓✓';
            color: #53bdeb;
        }

        /* Typing indicator */
        .typing-indicator {
            background-color: #202c33;
            color: #8696a0;
            align-self: flex-start;
            padding: 10px 14px;
            border-radius: 8px;
            border-bottom-left-radius: 2px;
            font-size: 13px;
            display: none;
        }

        .typing-indicator.visible {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .dot {
            width: 7px;
            height: 7px;
            background-color: #8696a0;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        /* Input area */
        .chat-input-area {
            background-color: #202c33;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #2a3942;
        }

        .chat-input-area input {
            flex: 1;
            background-color: #2a3942;
            border: none;
            border-radius: 24px;
            padding: 10px 16px;
            color: #e9edef;
            font-size: 15px;
            outline: none;
        }

        .chat-input-area input::placeholder {
            color: #8696a0;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background-color: #00a884;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background-color: #02c99e;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* Date divider */
        .date-divider {
            text-align: center;
            margin: 8px 0;
        }

        .date-divider span {
            background-color: #182229;
            color: #8696a0;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 8px;
        }

        /* Quick reply chips */
        .quick-replies {
            display: flex;
            gap: 8px;
            padding: 8px 12px 0;
            flex-wrap: wrap;
        }

        .chip {
            background-color: #2a3942;
            color: #00a884;
            border: 1px solid #00a884;
            border-radius: 16px;
            padding: 5px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .chip:hover {
            background-color: #00a88422;
        }
    </style>
</head>
<body>

<div class="chat-container">

    <!-- Header -->
    <div class="chat-header">
        <div class="avatar">🤖</div>
        <div class="header-info">
            <h3>WhatsApp Bot</h3>
            <div class="status online">online</div>
        </div>
    </div>

    <!-- Quick reply chips -->
    <div class="quick-replies">
        <div class="chip" onclick="sendQuick('Hi')">👋 Hi</div>
        <div class="chip" onclick="sendQuick('Bye')">👋 Bye</div>
        <div class="chip" onclick="sendQuick('Hello')">😊 Hello</div>
        <div class="chip" onclick="sendQuick('Goodbye')">🚪 Goodbye</div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
        <div class="date-divider"><span>Today</span></div>
        <div class="message received">
            👋 Hello! I'm your WhatsApp Bot.<br>Try saying <b>Hi</b> or <b>Bye</b>!
            <div class="time" id="welcomeTime"></div>
        </div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typingIndicator">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="Type a message" autocomplete="off" />
        <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"/>
            </svg>
        </button>
    </div>

</div>

<script>
    const phoneNumber = '+91' + Math.floor(9000000000 + Math.random() * 999999999);

    // Set welcome message time
    document.getElementById('welcomeTime').textContent = getTime();

    // Send on Enter key
    document.getElementById('messageInput').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') sendMessage();
    });

    function getTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function appendMessage(text, type) {
        const messages = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.classList.add('message', type);
        div.innerHTML = `${text}<div class="time">${getTime()}</div>`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function showTyping(visible) {
        const indicator = document.getElementById('typingIndicator');
        indicator.classList.toggle('visible', visible);
        const messages = document.getElementById('chatMessages');
        messages.scrollTop = messages.scrollHeight;
    }

    function sendQuick(text) {
        document.getElementById('messageInput').value = text;
        sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        appendMessage(text, 'sent');
        showTyping(true);

        try {
            const response = await fetch('/webhook', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    from: phoneNumber,
                    message: text,
                    timestamp: Date.now()
                })
            });

            const data = await response.json();

            // Simulate a short typing delay for realism
            setTimeout(() => {
                showTyping(false);
                appendMessage(data.reply, 'received');
            }, 800);

        } catch (err) {
            setTimeout(() => {
                showTyping(false);
                appendMessage('⚠️ Could not reach the server.', 'received');
            }, 800);
        }
    }
</script>

</body>
</html>
